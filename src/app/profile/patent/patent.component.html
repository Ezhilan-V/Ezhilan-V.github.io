<div class="section-wrapper" id="patent">
  <div class="patent-callout rounded-2xl p-5 sm:p-8 border border-violet-500/25 relative overflow-hidden" data-aos="fade-up">
    <!-- Background glow -->
    <div class="absolute top-0 right-0 w-64 h-64 bg-violet-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="relative z-10 flex flex-col lg:flex-row lg:items-center gap-6">
      <!-- Icon -->
      <div class="flex-shrink-0 w-14 h-14 rounded-xl bg-violet-500/15 border border-violet-500/30 flex items-center justify-center">
        <mat-icon class="text-violet-400 !text-2xl">workspace_premium</mat-icon>
      </div>

      <!-- Content -->
      <div class="flex-1">
        <p class="section-number mb-1">Patent Application</p>
        <h3 class="text-lg font-bold text-slate-100 mb-2">{{ patent.title }}</h3>
        <p class="text-sm text-slate-400 leading-relaxed mb-4">{{ patent.description }}</p>
        <div class="flex flex-col sm:flex-row sm:flex-wrap gap-y-1.5 sm:gap-x-6 sm:gap-y-2 text-xs text-slate-500">
          <span class="flex items-center gap-1.5">
            <mat-icon class="!text-xs !w-3 !h-3 text-violet-400">tag</mat-icon>
            {{ patent.applicationNumber }}
          </span>
          <span class="flex items-center gap-1.5">
            <mat-icon class="!text-xs !w-3 !h-3 text-violet-400">today</mat-icon>
            Filed {{ patent.filingDate }}
          </span>
          <span class="flex items-center gap-1.5">
            <mat-icon class="!text-xs !w-3 !h-3 text-violet-400">business</mat-icon>
            {{ patent.applicant }}
          </span>
        </div>
      </div>

      <!-- Impact badge -->
      <div class="flex-shrink-0 text-center bg-violet-500/10 border border-violet-500/25 rounded-xl px-5 py-3">
        <mat-icon class="text-violet-400 !text-2xl block mb-1">people</mat-icon>
        <p class="text-xs text-slate-400 leading-snug max-w-[120px]">{{ patent.impact }}</p>
      </div>
    </div>
  </div>
</div>
