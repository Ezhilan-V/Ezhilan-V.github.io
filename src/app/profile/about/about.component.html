<div class="section-wrapper" id="about">
  <p class="section-number" data-aos="fade-right">01 / About Me</p>
  <h2 class="text-2xl font-bold text-slate-100 mb-8 section-heading" data-aos="fade-right">
    About Me
  </h2>

  <!-- Lead paragraph -->
  <div class="mb-6" data-aos="fade-up">
    <p class="text-base md:text-lg text-slate-300 leading-relaxed font-medium">
      {{ professionalSummary[0] }}
    </p>
  </div>

  <!-- Remaining summary bullets -->
  <ul class="space-y-2 mb-10" data-aos="fade-up" data-aos-delay="80">
    <li *ngFor="let m of professionalSummary.slice(1)"
        class="flex items-start gap-3 text-sm text-slate-400 leading-relaxed">
      <span class="mt-2 w-1.5 h-1.5 rounded-full bg-sky-400 flex-shrink-0"></span>
      {{ m }}
    </li>
  </ul>

  <!-- 3-column info cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-14" data-aos="fade-up" data-aos-delay="160">

    <!-- Card 1: Contact -->
    <div class="dark-card rounded-2xl p-6">
      <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
        <mat-icon class="text-sky-400 !text-base">contact_page</mat-icon>
        Contact &amp; Location
      </h3>
      <div class="space-y-3">
        <div class="info-row">
          <span class="info-label">Email</span>
          <a [href]="'mailto:' + meta.email"
             class="info-value hover:text-sky-400 transition-colors truncate">
            {{ meta.email }}
          </a>
        </div>
        <div class="info-row">
          <span class="info-label">Location</span>
          <span class="info-value">{{ meta.location }}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Languages</span>
          <span class="info-value">{{ meta.languages }}</span>
        </div>
      </div>
    </div>

    <!-- Card 2: Patent -->
    <div class="dark-card rounded-2xl p-6">
      <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
        <mat-icon class="text-violet-400 !text-base">workspace_premium</mat-icon>
        Patent
      </h3>
      <p class="text-xs text-slate-400 leading-relaxed">{{ meta.patent }}</p>
    </div>

    <!-- Card 3: Social links -->
    <div class="dark-card rounded-2xl p-6">
      <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
        <mat-icon class="text-emerald-400 !text-base">link</mat-icon>
        Connect
      </h3>
      <div class="flex flex-col gap-3">
        <a [href]="meta.linkedin" target="_blank"
           class="flex items-center gap-2.5 text-sm text-slate-400 hover:text-sky-400 transition-colors group">
          <span class="w-7 h-7 rounded-full bg-sky-500/10 border border-sky-500/20 flex items-center justify-center group-hover:bg-sky-500/20 transition-colors">
            <i class="fab fa-linkedin text-xs"></i>
          </span>
          LinkedIn
        </a>
        <a [href]="meta.github" target="_blank"
           class="flex items-center gap-2.5 text-sm text-slate-400 hover:text-violet-400 transition-colors group">
          <span class="w-7 h-7 rounded-full bg-violet-500/10 border border-violet-500/20 flex items-center justify-center group-hover:bg-violet-500/20 transition-colors">
            <i class="fab fa-github text-xs"></i>
          </span>
          GitHub
        </a>
      </div>
    </div>

  </div>

</div>
