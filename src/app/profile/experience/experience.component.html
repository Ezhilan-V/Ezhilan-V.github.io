<div class="section-wrapper" id="experience">
  <h2 class="text-2xl font-bold text-slate-100 mb-12 section-heading" data-aos="fade-right">
    Work Experience
  </h2>

  <div class="relative">
    <!-- Timeline line -->
    <div class="hidden md:block absolute left-1/2 transform -translate-x-px h-full w-px bg-gradient-to-b from-sky-500/50 via-violet-500/30 to-transparent"></div>

    <div class="space-y-10">
      <div *ngFor="let exp of workexp; let isOdd = odd; let i = index" class="relative">
        <div class="flex flex-col md:flex-row items-start md:justify-center"
             [class.md:flex-row-reverse]="isOdd"
             [attr.data-aos]="isOdd ? 'fade-left' : 'fade-right'"
             [attr.data-aos-delay]="i * 100">

          <!-- Date label -->
          <div class="hidden md:flex md:w-1/2 px-8 items-center"
               [class.justify-end]="!isOdd"
               [class.justify-start]="isOdd">
            <span class="text-xs font-semibold text-slate-400 tracking-wide uppercase bg-dark-surface border border-dark-border px-3 py-1 rounded-full">
              {{ exp.period }}
            </span>
          </div>

          <!-- Timeline dot -->
          <div class="absolute left-0 md:left-1/2 transform md:-translate-x-1/2 mt-6 z-10">
            <div class="w-4 h-4 rounded-full border-2 border-dark-bg ring-2 ring-offset-0"
                 [ngClass]="exp.color"
                 [style.box-shadow]="'0 0 12px ' + (exp.color.includes('green') ? 'rgba(34,197,94,0.5)' : exp.color.includes('orange') ? 'rgba(249,115,22,0.5)' : exp.color.includes('blue') ? 'rgba(59,130,246,0.5)' : exp.color.includes('yellow') ? 'rgba(234,179,8,0.5)' : 'rgba(239,68,68,0.5)')">
            </div>
          </div>

          <!-- Card -->
          <div class="ml-8 md:ml-0 md:w-1/2 md:px-8">
            <div class="bg-dark-card border border-white/[0.07] rounded-2xl p-6 hover:border-white/20 hover:shadow-2xl hover:shadow-black/50 transition-all duration-300 hover:-translate-y-1">

              <!-- Header -->
              <div class="cursor-pointer" (click)="toggleExperience(exp.id)">
                <div class="flex justify-between items-start gap-2">
                  <div>
                    <h3 class="text-base font-bold text-slate-100">{{ exp.company }}</h3>
                    <p class="text-xs text-slate-500 mt-0.5">{{ exp.location }}</p>
                  </div>
                  <div class="flex flex-col items-end gap-1 flex-shrink-0">
                    <span class="text-sm font-semibold text-sky-400">{{ exp.role }}</span>
                    <span class="text-xs text-slate-500 md:hidden">{{ exp.period }}</span>
                    <svg [class]="'w-4 h-4 text-slate-400 transform transition-transform duration-300 ' + (isExperienceExpanded(exp.id) ? 'rotate-180' : '')"
                         xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                      <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                  </div>
                </div>
              </div>

              <!-- Expanded -->
              <div *ngIf="isExperienceExpanded(exp.id)" class="mt-5 pt-5 border-t border-white/[0.06] animate-fadeIn">

                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Key Responsibilities</h4>
                <ul class="space-y-2 mb-6">
                  <li *ngFor="let r of exp.responsibilities; let j = index"
                      class="flex items-start gap-2 text-sm text-slate-300 animate-slideIn"
                      [style.animation-delay]="j * 60 + 'ms'">
                    <span class="mt-2 w-1 h-1 rounded-full bg-sky-400 flex-shrink-0"></span>
                    {{ r }}
                  </li>
                </ul>

                <!-- Sub-projects -->
                <div *ngIf="exp.subProjects && exp.subProjects.length > 0">
                  <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Projects</h4>
                  <div class="space-y-2">
                    <div *ngFor="let project of exp.subProjects"
                         class="rounded-xl border border-white/[0.06] overflow-hidden">
                      <div class="px-4 py-3 cursor-pointer hover:bg-white/[0.04] transition-colors flex justify-between items-center"
                           (click)="toggleProject(project.id)">
                        <div>
                          <span class="text-sm font-semibold text-slate-200">{{ project.name }}</span>
                          <span class="text-xs text-slate-500 ml-2">· {{ project.role }}</span>
                        </div>
                        <svg [class]="'w-4 h-4 text-slate-500 transform transition-transform duration-300 ' + (isProjectExpanded(project.id) ? 'rotate-180' : '')"
                             xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                          <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
                        </svg>
                      </div>

                      <div *ngIf="isProjectExpanded(project.id)" class="px-4 pb-4 border-t border-white/[0.06] animate-slideDown">
                        <p class="text-xs text-slate-400 mt-3 mb-3">{{ project.description }}</p>

                        <div class="flex flex-wrap gap-1.5 mb-3">
                          <span *ngFor="let tech of project.technologies"
                                class="px-2 py-0.5 text-xs rounded-full bg-sky-500/10 text-sky-300 border border-sky-500/20">
                            {{ tech }}
                          </span>
                        </div>

                        <ul class="space-y-1.5">
                          <li *ngFor="let resp of project.responsibilities"
                              class="flex items-start gap-2 text-xs text-slate-400">
                            <span class="mt-1.5 w-1 h-1 rounded-full bg-violet-400 flex-shrink-0"></span>
                            {{ resp }}
                          </li>
                        </ul>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
