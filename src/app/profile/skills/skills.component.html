<div class="section-wrapper" id="skills">
  <p class="section-number" data-aos="fade-right">02 / Skills</p>
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-2xl font-bold text-slate-100 section-heading" data-aos="fade-right">
      Technical Skills
    </h2>
    <button *ngIf="selectedSkill || selectedCategory"
            (click)="clearFilter()"
            class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-full bg-sky-500/15 text-sky-400 border border-sky-500/30 hover:bg-sky-500/25 transition-all">
      <mat-icon class="!text-sm !w-4 !h-4">filter_alt_off</mat-icon>
      Clear: {{ selectedSkill || selectedCategory }}
    </button>
  </div>

  <p class="text-sm text-slate-400 mb-6 -mt-4" *ngIf="!selectedSkill && !selectedCategory" data-aos="fade-up">
    Click a category header or individual skill to filter projects
  </p>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <div
      *ngFor="let cat of categories; let i = index"
      class="skill-card rounded-2xl overflow-hidden border border-white/[0.07] bg-dark-card transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-black/40 group"
      [class.cat-active]="isCategorySelected(cat.name)"
      [attr.data-aos]="'fade-up'"
      [attr.data-aos-delay]="i * 80">

      <!-- Clickable header -->
      <button class="cat-header w-full text-left px-5 py-4 bg-gradient-to-r flex items-center gap-3"
              [ngClass]="cat.color"
              (click)="selectCategory(cat)"
              [title]="'Filter projects by ' + cat.name">
        <mat-icon class="text-white opacity-90 flex-shrink-0" style="font-size:1.25rem;width:1.25rem;height:1.25rem;line-height:1.25rem;">{{ cat.icon }}</mat-icon>
        <h3 class="text-sm font-bold text-white tracking-wide uppercase m-0">{{ cat.name }}</h3>
      </button>

      <!-- Chips -->
      <div class="p-4 flex flex-wrap gap-2">
        <span
          *ngFor="let skill of cat.skills; let j = index"
          (click)="selectSkill(skill)"
          [class.skill-active]="isSkillSelected(skill)"
          class="skill-chip px-2.5 py-1 text-xs font-medium rounded-full border transition-all cursor-pointer select-none flex items-center gap-1.5"
          [attr.data-aos]="'fade-in'"
          [attr.data-aos-delay]="i * 60 + j * 25">
          <i *ngIf="getIcon(skill)" [class]="getIcon(skill)! + ' hidden md:inline-block text-[10px] opacity-70'"></i>
          {{ skill }}
        </span>
      </div>
    </div>
  </div>
</div>
