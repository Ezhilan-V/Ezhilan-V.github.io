<section class="py-12 bg-white" id="skills">
  <div class="container mx-auto px-4">
    <h2 class="text-3xl font-bold text-center mb-10" data-aos="fade-down">Technical Skills</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div
        *ngFor="let cat of categories; let i = index"
        class="rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300"
        [attr.data-aos]="'fade-up'"
        [attr.data-aos-delay]="i * 80">

        <!-- Category Header -->
        <div class="p-4 text-white bg-gradient-to-r" [ngClass]="cat.color">
          <div class="flex items-center gap-2">
            <mat-icon class="text-white">{{ cat.icon }}</mat-icon>
            <h3 class="text-lg font-semibold">{{ cat.name }}</h3>
          </div>
        </div>

        <!-- Skills Chips -->
        <div class="p-4 bg-gray-50 flex flex-wrap gap-2">
          <span
            *ngFor="let skill of cat.skills; let j = index"
            class="px-3 py-1 text-sm font-medium rounded-full bg-white border border-gray-200 text-gray-700 shadow-sm hover:shadow-md hover:-translate-y-0.5 transform transition-all duration-200 cursor-default"
            [attr.data-aos]="'fade-in'"
            [attr.data-aos-delay]="i * 80 + j * 30">
            {{ skill }}
          </span>
        </div>
      </div>
    </div>
  </div>
</section>
