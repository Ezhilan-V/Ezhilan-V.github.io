<div class="section-wrapper" id="skills">
  <h2 class="text-2xl font-bold text-slate-100 mb-8 section-heading" data-aos="fade-right">
    Technical Skills
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <div
      *ngFor="let cat of categories; let i = index"
      class="rounded-2xl overflow-hidden border border-white/[0.07] bg-dark-card hover:border-white/20 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-black/40 group"
      [attr.data-aos]="'fade-up'"
      [attr.data-aos-delay]="i * 80">

      <!-- Header with gradient -->
      <div class="px-5 py-4 bg-gradient-to-r flex items-center gap-3" [ngClass]="cat.color">
        <mat-icon class="text-white opacity-90 !text-lg">{{ cat.icon }}</mat-icon>
        <h3 class="text-sm font-bold text-white tracking-wide uppercase">{{ cat.name }}</h3>
      </div>

      <!-- Chips -->
      <div class="p-4 flex flex-wrap gap-2">
        <span
          *ngFor="let skill of cat.skills; let j = index"
          class="px-2.5 py-1 text-xs font-medium rounded-full bg-white/[0.06] text-slate-300 border border-white/[0.08] hover:bg-white/[0.12] hover:text-white transition-all cursor-default"
          [attr.data-aos]="'fade-in'"
          [attr.data-aos-delay]="i * 60 + j * 25">
          {{ skill }}
        </span>
      </div>
    </div>
  </div>
</div>
