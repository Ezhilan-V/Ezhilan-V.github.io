<nav [class]="'fixed top-0 left-0 right-0 z-50 transition-all duration-300 ' + navBg">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between h-16">

      <!-- Brand -->
      <button (click)="scrollToSection('top')"
              class="text-xl font-bold bg-gradient-to-r from-slate-100 via-sky-300 to-violet-400 bg-clip-text text-transparent hover:opacity-80 transition-opacity select-none">
        {{ initials }}
      </button>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center gap-1">
        <button *ngFor="let link of navLinks"
                (click)="scrollToSection(link.id)"
                [class]="'px-3 py-2 text-sm font-medium rounded-lg transition-all ' + (activeSection === link.id ? 'text-sky-400 bg-sky-500/10' : 'text-slate-400 hover:text-sky-400 hover:bg-white/[0.05]')">
          {{ link.label }}
        </button>
        <div class="flex items-center gap-1 ml-3 pl-3 border-l border-white/[0.08]">
          <a [href]="meta.linkedin" target="_blank"
             class="p-2 text-slate-400 hover:text-sky-400 hover:bg-sky-500/10 rounded-lg transition-all" title="LinkedIn">
            <i class="fab fa-linkedin"></i>
          </a>
          <a [href]="meta.github" target="_blank"
             class="p-2 text-slate-400 hover:text-violet-400 hover:bg-violet-500/10 rounded-lg transition-all" title="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a [href]="'mailto:' + meta.email"
             class="p-2 text-slate-400 hover:text-emerald-400 hover:bg-emerald-500/10 rounded-lg transition-all" title="Email">
            <i class="fas fa-envelope"></i>
          </a>
        </div>
      </div>

      <!-- Right-side controls -->
      <div class="flex items-center gap-2">
        <!-- Theme toggle -->
        <button (click)="toggleTheme()"
                [title]="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
                class="flex items-center justify-center w-9 h-9 rounded-lg transition-all theme-toggle-btn">
          <mat-icon [class]="isDark ? 'text-amber-400' : 'text-slate-500'">
            {{ isDark ? 'light_mode' : 'dark_mode' }}
          </mat-icon>
        </button>

        <!-- Mobile hamburger -->
        <button (click)="toggleMobileMenu()"
                class="md:hidden p-2 text-slate-400 hover:text-sky-400 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path *ngIf="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            <path *ngIf="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile dropdown -->
    <div *ngIf="mobileMenuOpen"
         class="md:hidden bg-[#080b14]/98 backdrop-blur-md border-t border-white/[0.07] pb-4 space-y-1">
      <button *ngFor="let link of navLinks"
              (click)="scrollToSection(link.id)"
              [class]="'block w-full text-left px-4 py-2.5 text-sm font-medium rounded-lg transition-all ' + (activeSection === link.id ? 'text-sky-400 bg-sky-500/10' : 'text-slate-400 hover:text-sky-400 hover:bg-white/[0.04]')">
        {{ link.label }}
      </button>
      <div class="flex items-center gap-4 px-4 pt-3 mt-2 border-t border-white/[0.07]">
        <a [href]="meta.linkedin" target="_blank"
           class="text-slate-400 hover:text-sky-400 transition-colors">
          <i class="fab fa-linkedin text-lg"></i>
        </a>
        <a [href]="meta.github" target="_blank"
           class="text-slate-400 hover:text-violet-400 transition-colors">
          <i class="fab fa-github text-lg"></i>
        </a>
        <a [href]="'mailto:' + meta.email"
           class="text-slate-400 hover:text-emerald-400 transition-colors">
          <i class="fas fa-envelope text-lg"></i>
        </a>
      </div>
    </div>
  </div>

  <!-- Scroll progress bar -->
  <div class="progress-bar" [style.width.%]="scrollProgress"></div>
</nav>
