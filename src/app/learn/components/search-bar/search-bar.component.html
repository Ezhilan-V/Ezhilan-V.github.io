<div class="learn-search" [class.is-open]="open">
  <div class="learn-search__input-wrap">
    <i class="fas fa-search learn-search__icon"></i>
    <input
      #input
      type="text"
      class="learn-search__input"
      placeholder="Search branches, sections, terms, quizzes…"
      [value]="query"
      (input)="setQuery($any($event.target).value)"
      (focus)="onFocus()"
      (keydown)="onKey($event)"
      autocomplete="off"
      spellcheck="false"
      aria-label="Search the Learn module" />
    <kbd class="learn-search__hotkey" *ngIf="!query">/</kbd>
    <button *ngIf="query" type="button" class="learn-search__clear" (click)="clear()" aria-label="Clear">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div *ngIf="open" class="learn-search__panel" role="listbox">
    <ng-container *ngIf="results.length; else noResults">
      <button *ngFor="let r of results; let i = index; trackBy: trackItem"
              type="button"
              class="learn-search__result"
              [class.is-selected]="i === selectedIndex"
              [style.--accent]="r.accent"
              (mouseenter)="selectedIndex = i"
              (click)="go(r)"
              role="option"
              [attr.aria-selected]="i === selectedIndex">
        <span class="learn-search__result-icon">
          <i class="fas" [class]="r.icon"></i>
        </span>
        <span class="learn-search__result-text">
          <strong>{{ r.title }}</strong>
          <span>{{ r.subtitle }}</span>
        </span>
        <span class="learn-search__result-kind">{{ r.kind }}</span>
      </button>
    </ng-container>

    <ng-template #noResults>
      <div class="learn-search__empty">
        <i class="fas fa-magnifying-glass"></i>
        <p>No matches for <strong>{{ query }}</strong>.</p>
        <span>Try a shorter term, or browse the sidebar.</span>
      </div>
    </ng-template>

    <div class="learn-search__footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> open</span>
      <span><kbd>esc</kbd> close</span>
    </div>
  </div>
</div>
